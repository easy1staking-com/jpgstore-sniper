spring:
  flyway:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jpgsniper}
    user: ${DB_USERNAME:jpgsniper}
    password: ${DB_PASSWORD:password}
    schemas: ${DB_SCHEMA:}
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/store/jpgsniper
    out-of-order: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jpgsniper}
    username: ${DB_USERNAME:jpgsniper}
    password: ${DB_PASSWORD:password}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

network: mainnet

bootstrap:
  settings:
    utxo:
      txHash: d444055834b0697b4db6c3385c4293d2a265b4a7bd549f14af6ee561d98a7976
      index: 0

blockfrost:
  url: https://cardano-mainnet.blockfrost.io/api/v0/
  key: ""

store:
  cardano:
    host: ""
    port: 0
    protocol-magic: 764824073
    # Start from the block that minted the ref input for the contract
    sync-start-blockhash: b33d45cf1537651fe8789a92514654636dd0beb5eaf5e5ac5c03a419f92d1ab2
    sync-start-slot: 180746279
  utxo:
    pruning-enabled: true
    pruning:
      interval: 600
  blocks:
    epoch-calculation-interval=14400:  # 14400 = 4 hours

apiPrefix: /api/v1

plutus:
  json-path: classpath:plutus.json

wallet:
  mnemonic: ""

---
spring:
  config:
    activate:
      on-profile: preview

network: preview

bootstrap:
  settings:
    utxo:
      txHash: 3f59fd0b05d4755c72879372a903d61fb67f30be5d925267cc95a06d229f9971
      index: 1

blockfrost:
  url: https://cardano-preview.blockfrost.io/api/v0/

store:
  cardano:
    host: ""
    port: 0
    protocol-magic: 2
    sync-start-blockhash: c196c1915bf07235284131d5f84b395061477285d74aba8634a82b5c2b22ed2f
    sync-start-slot: 69599150
